<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.app {
  display: flex; flex-direction: column;
  height: 680px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg, #ffffff); color: var(--text, #111827); overflow: hidden;
  font-size: 13px;
}

/* HEADER */
.header {
  padding: 12px 20px; border-bottom: 1px solid var(--border, #e5e7eb);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 14px; font-weight: 700; }
.header-sub { font-size: 11px; color: #6b7280; }
.legend { display: flex; gap: 12px; align-items: center; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6b7280; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.leg-mvp { background: #3b82f6; }
.leg-v1 { background: #8b5cf6; }
.leg-v2 { background: #9ca3af; }

/* LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 210px; border-right: 1px solid var(--border, #e5e7eb);
  overflow-y: auto; flex-shrink: 0; padding: 8px 0;
}
.sidebar-section { padding: 6px 12px 2px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; }
.mod-item {
  padding: 7px 12px; cursor: pointer; display: flex; align-items: center;
  gap: 8px; border-left: 3px solid transparent; transition: all 0.1s;
}
.mod-item:hover { background: #f9fafb; }
.mod-item.active { border-left-color: #6366f1; background: #f5f3ff; font-weight: 600; }
.mod-icon { font-size: 14px; flex-shrink: 0; }
.mod-info { flex: 1; min-width: 0; }
.mod-name { font-size: 11.5px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mod-num { font-size: 10px; color: #9ca3af; }
.phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* BREADCRUMB */
.breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
  font-size: 12px; color: #6b7280; flex-wrap: wrap; }
.bc-link { cursor: pointer; color: #6366f1; }
.bc-link:hover { text-decoration: underline; }
.bc-sep { color: #d1d5db; }
.bc-current { color: #111827; font-weight: 600; }

/* HOME VIEW */
.home-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.home-sub { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
.phase-group { margin-bottom: 20px; }
.phase-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.phase-mvp { color: #2563eb; }
.phase-v1 { color: #7c3aed; }
.phase-v2 { color: #6b7280; }
.phase-line { flex: 1; height: 1px; background: currentColor; opacity: 0.2; }

.mod-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
.mod-card {
  border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; cursor: pointer;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.mod-card:hover { border-color: #6366f1; box-shadow: 0 4px 12px rgba(99,102,241,0.12);
  transform: translateY(-1px); }
.mod-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
.mod-card-icon { font-size: 22px; margin-bottom: 8px; }
.mod-card-num { font-size: 10px; font-weight: 700; color: #9ca3af; margin-bottom: 3px; }
.mod-card-name { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 10px; }
.mod-card-stats { display: flex; align-items: center; justify-content: space-between; }
.stat-count { font-size: 11px; color: #6b7280; }
.warn-count { font-size: 10px; background: #fffbeb; color: #d97706; padding: 1px 5px;
  border-radius: 4px; font-weight: 600; border: 1px solid #fde68a; }

/* SCREENS VIEW */
.screens-header { margin-bottom: 14px; }
.screens-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
.screens-sub { font-size: 12px; color: #6b7280; }
.screens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

.screen-card {
  border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; cursor: pointer;
  transition: all 0.15s;
}
.screen-card:hover { border-color: #6366f1; box-shadow: 0 2px 8px rgba(99,102,241,0.1);
  transform: translateY(-1px); }
.screen-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
.screen-name { font-size: 12.5px; font-weight: 600; line-height: 1.3; flex: 1; }
.screen-status { font-size: 13px; flex-shrink: 0; }
.screen-route { font-size: 10px; color: #9ca3af; font-family: monospace; margin-bottom: 6px;
  background: #f9fafb; padding: 2px 5px; border-radius: 3px; display: inline-block; }
.screen-roles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.role-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: #f3f4f6; color: #6b7280; }
.role-apprenant { background: #dbeafe; color: #1d4ed8; }
.role-coach { background: #d1fae5; color: #065f46; }
.role-manager { background: #ede9fe; color: #5b21b6; }
.role-admin { background: #fee2e2; color: #991b1b; }
.role-public { background: #f0fdf4; color: #166534; }
.role-collab { background: #fef3c7; color: #92400e; }
.role-expert { background: #fce7f3; color: #9d174d; }
.role-dev { background: #e0e7ff; color: #3730a3; }

.prio { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px; }
.p0 { background: #fee2e2; color: #dc2626; }
.p1 { background: #fef3c7; color: #d97706; }
.p2 { background: #f3f4f6; color: #9ca3af; }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--bg, #fff); border-radius: 12px; width: 100%; max-width: 480px;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-head {
  padding: 18px 20px 14px; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  position: sticky; top: 0; background: var(--bg, #fff); z-index: 1;
}
.modal-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
.modal-close {
  border: none; background: #f3f4f6; cursor: pointer; width: 28px; height: 28px;
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #6b7280; flex-shrink: 0; transition: background 0.1s;
}
.modal-close:hover { background: #e5e7eb; }
.modal-body { padding: 16px 20px 20px; }
.m-section { margin-bottom: 14px; }
.m-label { font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: #9ca3af; margin-bottom: 5px; }
.m-value { font-size: 13px; line-height: 1.5; color: #374151; }
.m-route { font-family: monospace; font-size: 12px; background: #f9fafb;
  padding: 4px 8px; border-radius: 5px; border: 1px solid #e5e7eb; display: inline-block; }
.m-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.warn-box {
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 7px;
  padding: 10px 12px; font-size: 12px; color: #92400e; display: flex; gap: 8px;
  margin-top: 10px;
}
.ok-box {
  background: #f0fdf4; border: 1px solid #86efac; border-radius: 7px;
  padding: 10px 12px; font-size: 12px; color: #166534; display: flex; gap: 8px;
  margin-top: 10px;
}
.mod-ref { display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
  background: #f5f3ff; color: #6d28d9; padding: 3px 8px; border-radius: 5px;
  font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
</style>

<div class="app" id="app">

// -------
// STATE
// -------
let currentView = 'home'; // 'home' | 'module'
let currentModule = null;
let modalScreen = null;

// -------
// SIDEBAR
// -------
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const sections = [
    { label: 'MVP Juillet', phase: 'MVP', ids: ['m1','m1b','m2','m3','m4','m5','m6','m9','m10','m13b'] },
    { label: 'V1 Septembre', phase: 'V1', ids: ['m7','m8','m11','m12','m13'] },
  ];
  let html = '';
  sections.forEach(sec => {
    html += `<div class="sidebar-section">${sec.label}</div>`;
    modules.filter(m => sec.ids.includes(m.id)).forEach(m => {
      const warns = m.screens.filter(s => s.status === 'warn').length;
      const isActive = currentView === 'module' && currentModule && currentModule.id === m.id;
      html += `<div class="mod-item ${isActive ? 'active' : ''}" onclick="selectModule('${m.id}')">
        <span class="mod-icon">${m.icon}</span>
        <div class="mod-info">
          <div class="mod-name">${m.name}</div>
          <div class="mod-num">${m.num} · ${m.screens.length} écrans</div>
        </div>
        <div class="phase-dot" style="background:${PHASES[m.phase].color}"></div>
      </div>`;
    });
  });
  sidebar.innerHTML = html;
}

// -------
// HOME
// -------
function renderHome() {
  const sections = [
    { phase: 'MVP', label: 'MVP Juillet 2026', ids: ['m1','m1b','m2','m3','m4','m5','m6','m9','m10','m13b'] },
    { phase: 'V1', label: 'V1 Septembre 2026', ids: ['m7','m8','m11','m12','m13'] },
  ];
  let html = `<div class="breadcrumb"><span class="bc-current">📱 Tous les modules</span></div>`;
  sections.forEach(sec => {
    const mods = modules.filter(m => sec.ids.includes(m.id));
    const total = mods.reduce((a, m) => a + m.screens.length, 0);
    html += `<div class="phase-group">
      <div class="phase-label phase-${sec.phase.toLowerCase()}">
        <span>${sec.label} — ${mods.length} modules · ${total} écrans</span>
        <span class="phase-line"></span>
      </div>
      <div class="mod-cards">`;
    mods.forEach(m => {
      const warns = m.screens.filter(s => s.status === 'warn').length;
      html += `<div class="mod-card" onclick="selectModule('${m.id}')">
        <div class="mod-card-accent" style="background:${PHASES[m.phase].color}"></div>
        <div class="mod-card-icon">${m.icon}</div>
        <div class="mod-card-num">${m.num}</div>
        <div class="mod-card-name">${m.name}</div>
        <div class="mod-card-stats">
          <span class="stat-count">${m.screens.length} écrans</span>
          ${warns > 0 ? `<span class="warn-count">⚠️ ${warns}</span>` : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('content').innerHTML = html;
}

// -------
// MODULE VIEW
// -------
function renderModule(m) {
  const warns = m.screens.filter(s => s.status === 'warn').length;
  let html = `<div class="breadcrumb">
    <span class="bc-link" onclick="goHome()">📱 Tous les modules</span>
    <span class="bc-sep">›</span>
    <span class="bc-current">${m.icon} ${m.num} ${m.name}</span>
  </div>
  <div class="screens-header">
    <div class="screens-title">
      ${m.icon} ${m.name}
      <span class="prio p0" style="font-size:11px;font-weight:600">MVP</span>
    </div>
    <div class="screens-sub">${m.screens.length} écrans FO${warns > 0 ? ` · <span style="color:#d97706">⚠️ ${warns} point(s) suspens</span>` : ''} · Cahier ${m.num}</div>
  </div>
  <div class="screens-grid">`;
  m.screens.forEach(s => {
    const roles = s.roles.map(r => `<span class="role-tag ${ROLES_CLASS[r] || 'role-tag'}">${r}</span>`).join('');
    html += `<div class="screen-card" onclick="showModal('${m.id}','${escapeId(s.name)}')">
      <div class="screen-card-top">
        <div class="screen-name">${s.name}</div>
        <span class="screen-status">${s.status === 'warn' ? '🟡' : '✅'}</span>
      </div>
      <div class="screen-route">${s.route}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px;">
        <span class="prio ${s.priority.toLowerCase()}">${s.priority}</span>
        ${roles}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

// -------
// MODAL
// -------
function showModal(moduleId, screenName) {
  const m = modules.find(x => x.id === moduleId);
  const s = m.screens.find(x => x.name === screenName);
  if (!s) return;
  const roles = s.roles.map(r => `<span class="role-tag ${ROLES_CLASS[r] || 'role-tag'}">${r}</span>`).join('');
  const statusBox = s.status === 'warn'
    ? `<div class="warn-box"><span>⚠️</span><span><strong>Point suspens :</strong> ${s.suspens}</span></div>`
    : `<div class="ok-box"><span>✅</span><span>Écran validé — prêt pour le développement</span></div>`;
  document.getElementById('modal-container').innerHTML = `
    <div class="overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div class="modal-title">${s.name}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="m-section">
            <div class="m-label">Module source</div>
            <div class="m-value"><span class="mod-ref">${m.icon} ${m.num} ${m.name}</span></div>
          </div>
          <div class="m-section">
            <div class="m-label">Route React</div>
            <div class="m-value"><span class="m-route">${s.route}</span></div>
          </div>
          <div class="m-section">
            <div class="m-label">Rôle(s)</div>
            <div class="m-value m-tags">${roles}</div>
          </div>
          <div class="m-section">
            <div class="m-label">Priorité</div>
            <div class="m-value"><span class="prio ${s.priority.toLowerCase()}">${s.priority}</span></div>
          </div>
          <div class="m-section">
            <div class="m-label">Description fonctionnelle</div>
            <div class="m-value">${s.desc}</div>
          </div>
          ${statusBox}
        </div>
      </div>
    </div>`;
}

function closeModal(event) {
  if (!event || event.target.classList.contains('overlay')) {
    document.getElementById('modal-container').innerHTML = '';
  }
}

// -------
// NAV
// -------
function escapeId(name) { return name.replace(/'/g, "\\'"); }

function selectModule(id) {
  const m = modules.find(x => x.id === id);
  currentView = 'module'; currentModule = m;
  renderSidebar(); renderModule(m);
}

function goHome() {
  currentView = 'home'; currentModule = null;
  renderSidebar(); renderHome();
}

// -------
// INIT
// -------
renderSidebar();
renderHome();
</script>
