<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Image non disponible">
  <rect width="1200" height="630" fill="#E8F4F7"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <!-- Motif grain subtil -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F4F7"/>
      <stop offset="100%" stop-color="#DCEBEF"/>
    </linearGradient>
  </defs>
  <!-- Icône image centrée -->
  <g transform="translate(540,255)">
    <!-- Cadre photo stylisé -->
    <rect x="0" y="0" width="120" height="90" rx="8" fill="none" stroke="#96C3CF" stroke-width="3"/>
    <!-- Soleil / paysage -->
    <circle cx="30" cy="28" r="12" fill="#96C3CF"/>
    <!-- Montagne stylisée -->
    <polyline points="0,90 40,45 65,68 85,50 120,90" fill="#B9D7DF" stroke="none"/>
  </g>
  <!-- Texte -->
  <text x="600" y="395" font-family="'League Spartan', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#3D7786" text-anchor="middle" letter-spacing="0.02em">Image non disponible</text>
  <text x="600" y="422" font-family="'Nunito', -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#4A8FA1" text-anchor="middle">The Learning Society</text>
</svg>
