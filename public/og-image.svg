<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F3E45"/>
      <stop offset="60%" stop-color="#2F5F6A"/>
      <stop offset="100%" stop-color="#3D7786"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ED843A"/>
      <stop offset="100%" stop-color="#F8B044"/>
    </linearGradient>
    <!-- Subtle dot pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient blob right -->
  <ellipse cx="950" cy="200" rx="320" ry="240" fill="#55A1B4" opacity="0.08"/>
  <ellipse cx="1050" cy="480" rx="200" ry="150" fill="#ED843A" opacity="0.07"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="4" height="470" rx="2" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="110" y="130" fill="white" opacity="0.55" font-size="14" font-weight="600" letter-spacing="4" text-transform="uppercase">THE LEARNING SOCIETY</text>

  <!-- Main headline -->
  <text x="110" y="240" fill="white" font-size="72" font-weight="800" letter-spacing="-2">Formateur</text>
  <text x="110" y="330" fill="white" font-size="72" font-weight="800" letter-spacing="-2">Augmenté.</text>

  <!-- Accent line -->
  <rect x="110" y="358" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="110" y="420" fill="white" opacity="0.75" font-size="22" font-weight="400">Formation certifiante · Learning App · Conseil STRIDE</text>
  <text x="110" y="454" fill="white" opacity="0.55" font-size="18" font-weight="400">Qualiopi via C-Campus · Éligible OPCO · 100 % à distance</text>

  <!-- Domain -->
  <text x="110" y="530" fill="white" opacity="0.4" font-size="16" font-weight="500" letter-spacing="1">thelearningsociety.fr</text>

  <!-- Right badge -->
  <rect x="900" y="220" width="220" height="56" rx="28" fill="white" opacity="0.08"/>
  <rect x="900" y="220" width="220" height="56" rx="28" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <text x="1010" y="253" fill="white" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="1">QUALIOPI</text>

  <rect x="900" y="294" width="220" height="56" rx="28" fill="white" opacity="0.08"/>
  <rect x="900" y="294" width="220" height="56" rx="28" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <text x="1010" y="327" fill="white" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="1">OPEN BADGE</text>

  <rect x="900" y="368" width="220" height="56" rx="28" fill="#ED843A" opacity="0.85"/>
  <text x="1010" y="401" fill="white" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">ÉLIGIBLE OPCO</text>
</svg>
