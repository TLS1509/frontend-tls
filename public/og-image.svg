<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8F4F7"/>
      <stop offset="45%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF9EE"/>
    </linearGradient>
  </defs>
  <!-- Background gradient light app -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent orange — fin trait vertical gauche -->
  <rect x="80" y="80" width="2" height="470" rx="1" fill="#ED843A"/>

  <!-- Eyebrow -->
  <text x="104" y="126" fill="#55A1B4" font-size="11" font-weight="600" letter-spacing="4">THE LEARNING SOCIETY</text>

  <!-- Headline ligne 1 -->
  <text x="100" y="300" fill="#1a1a1a" font-size="96" font-weight="800" letter-spacing="-3">Formateur</text>

  <!-- Headline ligne 2 — couleur accent teal -->
  <text x="100" y="412" fill="#55A1B4" font-size="96" font-weight="800" letter-spacing="-3">Augmenté.</text>

  <!-- Fine ligne orange sous le titre -->
  <rect x="100" y="440" width="52" height="2" rx="1" fill="#ED843A"/>

  <!-- Tagline -->
  <text x="100" y="490" fill="#6B7280" font-size="18" font-weight="400" letter-spacing="0.2">Formation IA certifiante · Learning App adaptative · Conseil STRIDE</text>

  <!-- Domaine bas droite — élément minimaliste -->
  <text x="1120" y="570" fill="#9CA3AF" font-size="13" font-weight="500" letter-spacing="0.5" text-anchor="end">thelearningsociety.fr</text>

  <!-- Cercle décoratif subtil — géométrie sobre droite -->
  <circle cx="1060" cy="240" r="180" fill="none" stroke="#E5E7EB" stroke-width="1"/>
  <circle cx="1060" cy="240" r="110" fill="none" stroke="#F3F4F6" stroke-width="1"/>

</svg>
